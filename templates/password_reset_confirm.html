{% extends "base.html" %}
{% load static %}

{% block title %}Нова парола{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
{% endblock %}

{% block content %}

<div class="auth-center">

    <div class="auth-wrapper">

        <div class="auth-card">

            <h2>Задаване на нова парола</h2>

            <p class="subtitle">
                Въведете новата си парола.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Нова парола</label>
                    {{ form.new_password1 }}
                </div>

                <div class="form-group">
                    <label>Повторете паролата</label>
                    {{ form.new_password2 }}
                </div>

                <button type="submit" class="btn-primary">
                    Смени паролата
                </button>
            </form>

        </div>

    </div>

</div>

{% endblock %}
